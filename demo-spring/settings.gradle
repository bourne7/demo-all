            library('druid-spring-boot-starter', 'com.alibaba:druid-spring-boot-3-starter:+')
            library('mysql-connector-java', 'mysql:mysql-connector-java:+')
            library('springdoc-openapi-starter-webmvc-ui', 'org.springdoc:springdoc-openapi-starter-webmvc-ui:+')
            library('spring-boot-starter-validation', 'org.springframework.boot:spring-boot-starter-validation:+')

            library('leveldb', 'org.iq80.leveldb:leveldb:+')
            library('rocksdb', 'org.rocksdb:rocksdbjni:+')
            library('disruptor', 'com.lmax:disruptor:3.+')

