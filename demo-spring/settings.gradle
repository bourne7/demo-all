include 'module:test-code'
include 'module:spring'

dependencyResolutionManagement {
    versionCatalogs {
        libs {
            library('javax.annotation-api', 'javax.annotation:javax.annotation-api:+')

            library('spring-boot-starter-test', 'org.springframework.boot:spring-boot-starter-test:+')
            library('spring-boot-starter-web-services', 'org.springframework.boot:spring-boot-starter-web-services:+')
            library('spring-boot-starter-actuator', 'org.springframework.boot:spring-boot-starter-actuator:+')
            library('spring-boot-starter-data-jpa', 'org.springframework.boot:spring-boot-starter-data-jpa:+')
            library('spring-boot-starter-cache', 'org.springframework.boot:spring-boot-starter-cache:+')

            library('lombok', 'org.projectlombok:lombok:+')
            library('guava', 'com.google.guava:guava:+')

            library('commons-lang3', 'org.apache.commons:commons-lang3:+')
            library('commons-collections4', 'org.apache.commons:commons-collections4:+')
            library('commons-pool2', 'org.apache.commons:commons-pool2:+')
            library('commons-text', 'org.apache.commons:commons-text:+')
            library('commons-math3', 'org.apache.commons:commons-math3:+')
            library('commons-compress', 'org.apache.commons:commons-compress:+')
            library('commons-codec', 'commons-codec:commons-codec:+')
