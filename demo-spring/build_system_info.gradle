import java.util.regex.Pattern

def static createFileIfNotExist(String filePath) {
    File file = new File(filePath)

    if (file.exists()) {
        file.delete()
    }

    def initFileContent = '''# 由gradle脚本生成。提供接口查询，以及显示在swagger UI。
local:
  info:
    gitTag: "gitTag"
    gitCommitId: "gitCommitId"
    gitBranch: "gitBranch"
    gradleCompileTime: "gradleCompileTime"'''
    file.createNewFile()
    file.write(initFileContent, "UTF-8")

}

def static replaceText(String filePath, Pattern regex, String value) {
    File file = new File(filePath)
    def fileText = file.getText("UTF-8")
    fileText = (fileText =~ regex).replaceAll(value)
    file.write(fileText, "UTF-8")
}

def static now() {
    return new Date().format('yyyy-MM-dd HH:mm:ss ZZ')
}

def getGitHash = { ->
    def result
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'rev-parse', 'HEAD'
            // commandLine 'git', 'rev-parse', '--short', 'HEAD'
            standardOutput = stdout
        }
        result = stdout.toString().trim()
    } catch (Exception e) {
        result = 'Cannot get git commit id. ' + e.getMessage()
    }

    return result
}

def getGitBranch = { ->
    def result
    try {
        // git branch | sed -n 2p
        // git log --oneline -n 1
        // git branch | grep '^\*'
        // git log -n 1 --pretty='%d %ad'
        def command = '''
            git log -n 1 --pretty='%d %ai'
        '''
        def proc = ['bash', '-c', command].execute()
        proc.waitFor()
        result = proc.text.replace(System.lineSeparator(), '')
                .replace('\r\n', '')
                .replace('\r', '')
                .replace('\n', '')
                .replace('* ', '')
                .trim()
    } catch (Exception e) {
        result = 'error happened when getting branch. ' + e.getMessage()
    }
    return result
}

tasks.register('testGetGitBranch') {
    println(getGitBranch())
}

def getGitTag = { ->
    def result
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            // --tags: Instead of using only the annotated tags, use any tag found in refs/tags
            // --always: Show uniquely abbreviated commit object as fallback.
            commandLine 'git', 'describe', '--tags', '--always'
            standardOutput = stdout
        }
        result = stdout.toString().trim()
    } catch (Exception e) {
        result = 'Cannot get git tag. ' + e.getMessage()
    }

    return result
}

tasks.register('modifySystemInfo') {
    doLast {
        // 修改一下配置文件，自动打上时间戳
        println('Modifying SystemInfo...')
        // Create path if not exist
        def filePathTemplateDir = "${projectDir}" + File.separator +
                "src" + File.separator + "main" + File.separator + "resources"

        println('filePathTemplateDir: ' + filePathTemplateDir)

        // Create a File object representing the directory
        boolean pathCheck = false
        try {
            File directory = new File(filePathTemplateDir);
            if (!directory.exists()) {
                pathCheck = directory.mkdirs()
            } else {
                pathCheck = true
            }
        } catch (Exception e) {
            println(e)
        }

        if (!pathCheck) {
            println("Failed to create directory. Gradle will not create info file.")
            return
        }

        // 需要修改的 配置文件
        def filePathTemplate = filePathTemplateDir + File.separator + "application-%s.yml"
        // 需要处理的配置文件
        def list = ['generatedInfo']
        // 配置文件里面的匹配
        def regGitTag = ~'gitTag: ".*"'
        def regGitCommitId = ~'gitCommitId: ".*"'
        def regGitBranch = ~'gitBranch: ".*"'
        def regGradleCompileTime = ~'gradleCompileTime: ".*"'
        // 运行时的时间
        def nowTime = now()
        list.each {

            // 需要替换的完整路径
            def filePath = String.format(filePathTemplate, it)
            println(filePath)

            // 如果文件不存在，就创建一个文件。为了防止提交这个文件，已经将这个文件添加到了 gitignore 里面。本地变动就不会被无意中添加到git了。
            createFileIfNotExist(filePath)

            // 需要替换的新的时间戳
            def gradleCompileTime = String.format('gradleCompileTime: "%s"', nowTime)
            println(gradleCompileTime)
            replaceText(filePath, regGradleCompileTime, gradleCompileTime)

            // 需要替换 gitCommitId
            def gitCommitId = String.format('gitCommitId: "%s"', getGitHash())
            println(gitCommitId)
            replaceText(filePath, regGitCommitId, gitCommitId)

            // 需要替换 gitCommitId
            def gitBranch = String.format('gitBranch: "%s"', getGitBranch())
            println(gitBranch)
            replaceText(filePath, regGitBranch, gitBranch)

            // 需要替换 gitTag
            def gitTag = String.format('gitTag: "%s"', getGitTag())
            println(gitTag)
            replaceText(filePath, regGitTag, gitTag)
        }
    }
}